name: 공개 웹 검증

on:
  pull_request:
    paths:
      - "web/rulelink_public_next/**"
      - "artifacts/publication/current/bundle.json"
      - "artifacts/publication/snapshots/**"
      - ".github/workflows/public-web-checks.yml"
  push:
    branches:
      - main
    paths:
      - "web/rulelink_public_next/**"
      - "artifacts/publication/current/bundle.json"
      - "artifacts/publication/snapshots/**"
      - ".github/workflows/public-web-checks.yml"

permissions:
  contents: read

concurrency:
  group: public-web-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-build:
    name: 타입 검사 및 정적 빌드
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web/rulelink_public_next

    steps:
      - name: 저장소 받기
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js 준비
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/rulelink_public_next/package-lock.json

      - name: 고정 의존성 설치
        run: npm ci

      - name: 공개 번들 차단 규칙 테스트
        run: npm run test:publication

      - name: 과거 출판 스냅샷 변경 차단
        env:
          RULELINK_SNAPSHOT_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: npm run validate:snapshot-diff -- "$RULELINK_SNAPSHOT_BASE"

      - name: 후보 출판본 변경 보고
        if: github.event_name == 'pull_request'
        env:
          RULELINK_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git show "${RULELINK_BASE_SHA}:artifacts/publication/current/bundle.json" > "${RUNNER_TEMP}/rulelink-base-bundle.json"
          npm run report:publication -- ../../artifacts/publication/current/bundle.json --current "${RUNNER_TEMP}/rulelink-base-bundle.json" >> "${GITHUB_STEP_SUMMARY}"

      - name: 공개본 최신성 보고
        run: npm run report:freshness >> "$GITHUB_STEP_SUMMARY"

      - name: 타입 검사
        run: npm run typecheck

      - name: 승인 출판본 정적 빌드
        env:
          RULELINK_PUBLIC_BUILD_CHECK: "true"
        run: npm run build

      - name: 승인 출판본 런타임 스모크
        env:
          RULELINK_PUBLIC_BUILD_CHECK: "true"
        run: npm run smoke:public-build
